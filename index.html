<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ежедневник</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --accent: #0071e3;
            --danger: #ff3b30;
            --success: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--accent);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 90;
        }
        .sidebar-overlay.active { display: block; }

        .sidebar {
            position: fixed;
            top: 0; left: -300px;
            width: 300px;
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            transition: left 0.3s ease;
            padding-top: 20px;
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 22px;
            font-weight: 700;
        }

        .sidebar-menu { list-style: none; padding: 10px 0; }

        .sidebar-menu li {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }
        .sidebar-menu li:hover { background: var(--bg); }
        .sidebar-menu li.active { color: var(--accent); font-weight: 600; }
        
        .menu-icon { font-size: 18px; width: 24px; text-align: center; }

        .sidebar-section {
            padding: 16px 20px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-section button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .list-item {
            padding: 10px 20px 10px 56px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:hover { background: var(--bg); }
        .list-item.active { color: var(--accent); font-weight: 600; }
        .list-item .list-count { font-size: 13px; color: var(--text-secondary); }
        .list-item .list-delete {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .list-item:hover .list-delete { opacity: 1; }
        .list-item .list-delete:hover { color: var(--danger); }

        .content { padding: 20px; max-width: 800px; margin: 0 auto; }

        .view { display: none; }
        .view.active { display: block; }

        .view-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
        .view-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }

        .filters { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .filter-chip.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

        .task-list { list-style: none; }

        .task-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .task-item:hover { border-color: var(--text-secondary); }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .task-checkbox:hover { border-color: var(--accent); }
        .task-item.completed .task-checkbox { background: var(--accent); border-color: var(--accent); }
        .task-item.completed .task-checkbox::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        .task-content { flex: 1; min-width: 0; }
        .task-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .task-meta { font-size: 13px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
        
        .task-item.completed .task-name { text-decoration: line-through; color: var(--text-secondary); }

        .task-actions { display: flex; gap: 8px; }
        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .action-btn.delete:hover { color: var(--danger); }

        .empty-state { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 15px; }

        .cal-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--surface);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .cal-nav button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .cal-nav button:hover { background: var(--bg); }
        .cal-title { font-size: 16px; font-weight: 600; text-transform: capitalize; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 30px; }
        .cal-weekday { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 8px 0; }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            position: relative;
            background: var(--surface);
            border: 1px solid transparent;
        }
        .cal-day:hover { border-color: var(--border); }
        .cal-day.today { font-weight: 700; color: var(--accent); }
        .cal-day.selected { background: var(--text-primary); color: white; font-weight: 600; }
        .cal-day.other-month { color: var(--text-secondary); opacity: 0.4; background: transparent; }
        .cal-day .dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; position: absolute; bottom: 6px; }
        .cal-day.selected .dot { background: white; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 { font-size: 18px; margin-bottom: 20px; font-weight: 600; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text-primary);
            min-width: 0;
            -webkit-appearance: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface);
        }
        .form-group textarea { height: 80px; resize: vertical; }

        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; min-width: 0; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); }

        @media (max-width: 480px) {
            .form-row { flex-direction: column; gap: 0; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="icon-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title">Ежедневник</div>
        <button class="icon-btn" onclick="openModal()">+</button>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">Меню</div>
        <ul class="sidebar-menu">
            <li class="active" onclick="showView('today')"><span class="menu-icon">•</span> Сегодня</li>
            <li onclick="showView('calendar')"><span class="menu-icon">▦</span> Календарь</li>
            <li onclick="showView('trash')"><span class="menu-icon">🗑</span> Корзина</li>
        </ul>
        <div class="sidebar-section">
            <span>Списки</span>
            <button onclick="addList()">+</button>
        </div>
        <div id="sidebar-lists"></div>
    </nav>

    <main class="content">
        
        <section id="view-today" class="view active">
            <h1 class="view-title" id="today-title">Сегодня</h1>
            <p class="view-subtitle" id="today-subtitle"></p>
            <div class="filters" id="today-filters"></div>
            <ul class="task-list" id="today-tasks"></ul>
        </section>

        <section id="view-calendar" class="view">
            <h1 class="view-title">Календарь</h1>
            <div class="cal-nav">
                <button onclick="changeYear(-1)">«</button>
                <button onclick="changeMonth(-1)">‹</button>
                <span class="cal-title" id="cal-title"></span>
                <button onclick="changeMonth(1)">›</button>
                <button onclick="changeYear(1)">»</button>
            </div>
            <div class="cal-grid">
                <div class="cal-weekday">Пн</div><div class="cal-weekday">Вт</div>
                <div class="cal-weekday">Ср</div><div class="cal-weekday">Чт</div>
                <div class="cal-weekday">Пт</div><div class="cal-weekday">Сб</div>
                <div class="cal-weekday">Вс</div>
            </div>
            <div class="cal-grid" id="cal-days" style="margin-top: -10px;"></div>
            <h2 style="font-size: 18px; margin: 20px 0 10px;" id="cal-day-title">Задачи на день</h2>
            <ul class="task-list" id="cal-tasks"></ul>
        </section>

        <section id="view-trash" class="view">
            <h1 class="view-title">Корзина</h1>
            <p class="view-subtitle">Удаленные задачи</p>
            <ul class="task-list" id="trash-tasks"></ul>
        </section>

    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modal-title">Новая задача</h3>
            <input type="hidden" id="task-id">
            
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="task-name" placeholder="Что нужно сделать?">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" id="task-date">
                </div>
                <div class="form-group">
                    <label>Время</label>
                    <input type="time" id="task-time">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Длительность</label>
                    <select id="task-duration">
                        <option value="">Не указана</option>
                        <option value="15">15 минут</option>
                        <option value="30">30 минут</option>
                        <option value="60">1 час</option>
                        <option value="90">1 час 30 мин</option>
                        <option value="120">2 часа</option>
                        <option value="180">3 часа</option>
                        <option value="custom">Своя...</option>
                    </select>
                </div>
                <div class="form-group" id="custom-duration-group" style="display:none;">
                    <label>Минуты</label>
                    <input type="number" id="task-custom-duration" min="1" placeholder="60">
                </div>
            </div>
            <div class="form-group">
                <label>Повторение</label>
                <select id="task-recurrence">
                    <option value="none">Не повторять</option>
                    <option value="daily">Ежедневно</option>
                    <option value="weekly">Еженедельно</option>
                    <option value="monthly">Ежемесячно</option>
                    <option value="yearly">Ежегодно</option>
                </select>
            </div>
            <div class="form-group">
                <label>Список</label>
                <select id="task-list-select"></select>
            </div>
            <div class="form-group">
                <label>Заметка</label>
                <textarea id="task-note" placeholder="Подробности..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="saveTask()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('diary-tasks') || '[]');
        let trash = JSON.parse(localStorage.getItem('diary-trash') || '[]');
        let lists = JSON.parse(localStorage.getItem('diary-lists') || '["Личное","Работа","Учёба","Здоровье"]');
        
        let calDate = new Date();
        let selectedCalDate = new Date();
        let activeFilter = 'Все';
        let activeListFilter = null;
        const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            if (viewName === 'today') {
                document.querySelector('.sidebar-menu li:nth-child(1)').classList.add('active');
                activeListFilter = null;
                document.getElementById('today-title').textContent = 'Сегодня';
            }
            if (viewName === 'calendar') document.querySelector('.sidebar-menu li:nth-child(2)').classList.add('active');
            if (viewName === 'trash') document.querySelector('.sidebar-menu li:nth-child(3)').classList.add('active');
            
            toggleSidebar(false);
            if (viewName === 'today') renderToday();
            if (viewName === 'calendar') renderCalendar();
            if (viewName === 'trash') renderTrash();
        }

        function toggleSidebar(forceState) {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebar-overlay');
            const isActive = typeof forceState === 'boolean' ? forceState : !sb.classList.contains('active');
            sb.classList.toggle('active', isActive);
            ov.classList.toggle('active', isActive);
        }

        function renderSidebarLists() {
            const cont = document.getElementById('sidebar-lists');
            cont.innerHTML = '';
            lists.forEach(list => {
                const count = tasks.filter(t => t.list === list && !t.completed).length;
                const div = document.createElement('div');
                div.className = 'list-item' + (activeListFilter === list ? ' active' : '');
                div.innerHTML = `
                    <span>${list}</span>
                    <span style="display:flex;align-items:center;gap:8px;">
                        <span class="list-count">${count}</span>
                        <button class="list-delete" onclick="event.stopPropagation(); deleteList('${list}')">✕</button>
                    </span>
                `;
                div.onclick = () => {
                    activeListFilter = list;
                    document.getElementById('today-title').textContent = list;
                    document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
                    document.querySelectorAll('.list-item').forEach(li => li.classList.remove('active'));
                    div.classList.add('active');
                    toggleSidebar(false);
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    document.getElementById('view-today').classList.add('active');
                    renderToday();
                };
                cont.appendChild(div);
            });
        }

        function addList() {
            const name = prompt('Название нового списка:');
            if (name && name.trim() && !lists.includes(name.trim())) {
                lists.push(name.trim());
                saveData();
                renderSidebarLists();
                updateListSelect();
            }
        }

        function deleteList(name) {
            const hasTasks = tasks.some(t => t.list === name);
            if (hasTasks) {
                if (!confirm(`В списке "${name}" есть задачи. Удалить список? Задачи останутся, но без категории.`)) return;
                tasks.forEach(t => { if (t.list === name) t.list = 'Без списка'; });
            } else {
                if (!confirm(`Удалить список "${name}"?`)) return;
            }
            lists = lists.filter(l => l !== name);
            if (activeListFilter === name) activeListFilter = null;
            saveData();
            renderSidebarLists();
            updateListSelect();
            refreshAll();
        }

        function updateListSelect() {
            const sel = document.getElementById('task-list-select');
            sel.innerHTML = '';
            lists.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l;
                opt.textContent = l;
                sel.appendChild(opt);
            });
            const opt = document.createElement('option');
            opt.value = 'Без списка';
            opt.textContent = 'Без списка';
            sel.appendChild(opt);
        }

        function renderToday() {
            const today = new Date();
            const opts = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('today-subtitle').textContent = today.toLocaleDateString('ru-RU', opts);
            
            renderFilters('today-filters');
            
            const todayStr = formatDate(today.getFullYear(), today.getMonth(), today.getDate());
            let filtered = tasks.filter(t => t.date === todayStr);
            if (activeListFilter) {
                filtered = filtered.filter(t => t.list === activeListFilter);
            } else if (activeFilter !== 'Все') {
                filtered = filtered.filter(t => t.list === activeFilter);
            }
            filtered.sort((a, b) => (a.time || '').localeCompare(b.time || ''));

            renderTaskList('today-tasks', filtered);
        }

        function renderCalendar() {
            const year = calDate.getFullYear();
            const month = calDate.getMonth();
            document.getElementById('cal-title').textContent = `${MONTHS[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let startDay = firstDay.getDay() - 1;
            if (startDay < 0) startDay = 6;

            const grid = document.getElementById('cal-days');
            grid.innerHTML = '';
            const today = new Date();

            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                grid.appendChild(createCalDay(prevMonthDays - i, true, year, month - 1));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                const isSelected = d === selectedCalDate.getDate() && month === selectedCalDate.getMonth() && year === selectedCalDate.getFullYear();
                grid.appendChild(createCalDay(d, false, year, month, isToday, isSelected));
            }

            const totalCells = startDay + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let d = 1; d <= remaining; d++) {
                grid.appendChild(createCalDay(d, true, year, month + 1));
            }

            renderCalTasks();
        }

        function createCalDay(day, isOther, year, month, isToday = false, isSelected = false) {
            const div = document.createElement('div');
            div.className = 'cal-day';
            if (isOther) div.classList.add('other-month');
            if (isToday) div.classList.add('today');
            if (isSelected) div.classList.add('selected');
            div.textContent = day;

            if (!isOther) {
                const dateStr = formatDate(year, month, day);
                if (tasks.some(t => t.date === dateStr && !t.completed)) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    div.appendChild(dot);
                }
                div.onclick = () => {
                    selectedCalDate = new Date(year, month, day);
                    renderCalendar();
                };
            }
            return div;
        }

        function renderCalTasks() {
            const dateStr = formatDate(selectedCalDate.getFullYear(), selectedCalDate.getMonth(), selectedCalDate.getDate());
            document.getElementById('cal-day-title').textContent = 
                `Задачи на ${selectedCalDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}`;
            
            let filtered = tasks.filter(t => t.date === dateStr);
            filtered.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            renderTaskList('cal-tasks', filtered);
        }

        function changeMonth(delta) { calDate.setMonth(calDate.getMonth() + delta); renderCalendar(); }
        function changeYear(delta) { calDate.setFullYear(calDate.getFullYear() + delta); renderCalendar(); }

        function renderFilters(containerId) {
            const cont = document.getElementById(containerId);
            cont.innerHTML = '';
            const allLists = ['Все', ...lists];
            allLists.forEach(list => {
                const chip = document.createElement('div');
                chip.className = 'filter-chip' + (list === activeFilter ? ' active' : '');
                chip.textContent = list;
                chip.onclick = () => { activeFilter = list; activeListFilter = null; renderToday(); };
                cont.appendChild(chip);
            });
        }

        function formatDuration(min) {
            if (!min) return '';
            min = parseInt(min);
            if (min < 60) return `${min} мин`;
            const h = Math.floor(min / 60);
            const m = min % 60;
            return m ? `${h} ч ${m} мин` : `${h} ч`;
        }

        function formatRecurrence(rec) {
            const map = { daily: 'Ежедневно', weekly: 'Еженедельно', monthly: 'Ежемесячно', yearly: 'Ежегодно' };
            return map[rec] || '';
        }

        function renderTaskList(containerId, taskArray) {
            const listEl = document.getElementById(containerId);
            listEl.innerHTML = '';
            if (taskArray.length === 0) {
                listEl.innerHTML = '<div class="empty-state">Нет задач</div>';
                return;
            }
            taskArray.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.completed ? ' completed' : '');
                li.onclick = (e) => {
                    if (!e.target.closest('.task-checkbox') && !e.target.closest('.action-btn')) {
                        openModal(task.id);
                    }
                };

                const meta = [];
                if (task.time) meta.push(task.time);
                if (task.duration) meta.push(formatDuration(task.duration));
                if (task.recurrence && task.recurrence !== 'none') meta.push('🔁 ' + formatRecurrence(task.recurrence));
                meta.push(task.list);

                li.innerHTML = `
                    <div class="task-checkbox" onclick="event.stopPropagation(); toggleDone('${task.id}')"></div>
                    <div class="task-content">
                        <div class="task-name">${task.name}</div>
                        <div class="task-meta">${meta.map(m => `<span>${m}</span>`).join('')}</div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn delete" onclick="event.stopPropagation(); deleteTask('${task.id}')">✕</button>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        function renderTrash() {
            const listEl = document.getElementById('trash-tasks');
            listEl.innerHTML = '';
            if (trash.length === 0) {
                listEl.innerHTML = '<div class="empty-state">Корзина пуста</div>';
                return;
            }
            trash.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-content">
                        <div class="task-name">${task.name}</div>
                        <div class="task-meta"><span>${task.date} ${task.time || ''}</span></div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="restoreTask('${task.id}')" style="color:var(--accent)">↩</button>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        function openModal(taskId = null) {
            document.getElementById('modal').classList.add('active');
            updateListSelect();
            document.getElementById('task-duration').value = '';
            document.getElementById('custom-duration-group').style.display = 'none';
            document.getElementById('task-recurrence').value = 'none';

            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                document.getElementById('modal-title').textContent = 'Редактирование';
                document.getElementById('task-id').value = task.id;
                document.getElementById('task-name').value = task.name;
                document.getElementById('task-date').value = task.date;
                document.getElementById('task-time').value = task.time;
                document.getElementById('task-list-select').value = task.list;
                document.getElementById('task-note').value = task.note || '';
                document.getElementById('task-recurrence').value = task.recurrence || 'none';
                if (task.duration) {
                    const durSel = document.getElementById('task-duration');
                    const opts = ['', '15', '30', '60', '90', '120', '180'];
                    if (opts.includes(String(task.duration))) {
                        durSel.value = task.duration;
                    } else {
                        durSel.value = 'custom';
                        document.getElementById('custom-duration-group').style.display = 'block';
                        document.getElementById('task-custom-duration').value = task.duration;
                    }
                }
            } else {
                document.getElementById('modal-title').textContent = 'Новая задача';
                document.getElementById('task-id').value = '';
                document.getElementById('task-name').value = '';
                document.getElementById('task-note').value = '';
                document.getElementById('task-time').value = '';
                const today = new Date();
                document.getElementById('task-date').value = formatDate(today.getFullYear(), today.getMonth(), today.getDate());
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveTask() {
            const name = document.getElementById('task-name').value.trim();
            if (!name) return alert('Введите название');

            const id = document.getElementById('task-id').value;
            let duration = document.getElementById('task-duration').value;
            if (duration === 'custom') {
                duration = document.getElementById('task-custom-duration').value;
            }
            const recurrence = document.getElementById('task-recurrence').value;

            const taskData = {
                name: name,
                date: document.getElementById('task-date').value,
                time: document.getElementById('task-time').value,
                duration: duration,
                recurrence: recurrence,
                list: document.getElementById('task-list-select').value,
                note: document.getElementById('task-note').value.trim()
            };

            if (id) {
                const task = tasks.find(t => t.id === id);
                Object.assign(task, taskData);
            } else {
                tasks.push({ id: Date.now().toString(), ...taskData, completed: false, createdAt: new Date().toISOString() });
            }

            saveData();
            closeModal();
            refreshAll();
        }

        function toggleDone(id) {
            const task = tasks.find(t => t.id === id);
            if (task) { task.completed = !task.completed; saveData(); refreshAll(); }
        }

        function deleteTask(id) {
            const idx = tasks.findIndex(t => t.id === id);
            if (idx > -1) {
                const removed = tasks.splice(idx, 1)[0];
                removed.deletedAt = new Date().toISOString();
                trash.push(removed);
                saveData();
                refreshAll();
            }
        }

        function restoreTask(id) {
            const idx = trash.findIndex(t => t.id === id);
            if (idx > -1) {
                const restored = trash.splice(idx, 1)[0];
                delete restored.deletedAt;
                tasks.push(restored);
                saveData();
                refreshAll();
            }
        }

        function formatDate(y, m, d) {
            return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        }

        function saveData() {
            localStorage.setItem('diary-tasks', JSON.stringify(tasks));
            localStorage.setItem('diary-trash', JSON.stringify(trash));
            localStorage.setItem('diary-lists', JSON.stringify(lists));
        }

        function refreshAll() {
            renderSidebarLists();
            if (document.getElementById('view-today').classList.contains('active')) renderToday();
            if (document.getElementById('view-calendar').classList.contains('active')) renderCalendar();
            if (document.getElementById('view-trash').classList.contains('active')) renderTrash();
        }

        document.getElementById('task-duration').addEventListener('change', function() {
            document.getElementById('custom-duration-group').style.display = this.value === 'custom' ? 'block' : 'none';
        });

        renderSidebarLists();
        updateListSelect();
        renderToday();
    </script>
</body>
</html>
